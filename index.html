<!DOCTYPE html>
<html lang="Ukranian">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js"
      }
    }
    </script>
    <title>Karaoke</title>
    <img src="karaoke.jpg" alt="Karaoke kartinka">
</head>
<body>
    <!--<h1>Karaoke Recklinghausen</h1>-->
    <div class="first_datei">
        <input type="text" id="input-code" placeholder="Input code" style="background-color: #FAEDC3; font-weight: bold;">
        <input type="text" id="input-name" placeholder="Input name" style="background-color: #FAEDC3; font-weight: bold;">
        <button id="login-btn" class="login-btn">Регистрация</button>
    </div>
    <main class="main hidden">
        <h1 class="songChoice">Выберите песню</h1>
        <p class="typeSong">Украинские песни</p>   
        <select name="u-songs" id="u-songs">
        </select>

        <p class="typeSong">Русские песни</p>
        <select name="r-songs" id="r-songs">
        </select>

        <p class="typeSong">Английские песни</p>
        <select name="e-songs" id="e-songs">
        </select>

        <p class="typeSong">Песни из мультиков</p>
        <select name="m-songs" id="m-songs">
        </select>
    
        <div class="input-group">
            <input type="text" id="inputSong" placeholder="">
            <label for="inputSong">Другая песня</label>
        </div>
        

        <!--<div class="input-group"> 
            <input type="text" id="users_name" placeholder="" required>
            <label for="users_name">Введіть своє ім'я</label>
        </div>-->
        


        <button class="send_btn" id="send_btn">Отправить в очередь</button>
        <a href="songsList.html" target="_blank" class="listview" style="color: #FAEDC3; display: block;">Посмотреть очередь</a>
    </main>
    <!--<button onclick="localStorage.clear(); location.reload();">Сбросить тест</button>-->
    
    <script type="module" src="scrypt/scrypt_index.js"></script>
</body>
<footer style="color: #FAEDC3;">Created by Margaryta Zinchenko</footer>
</html>
